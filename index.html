<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Test AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: sans-serif;
}

/* A-FRAME FULLSCREEN */

a-scene {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: transparent;
}

/* MENÚ */

#startScreen {
  position: fixed;
  inset: 0;
  background: url("Loading screen.png") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: 20%;
  z-index: 10;
}

#modelTitle {
  font-size: 22px;
  margin-bottom: 12px;
  text-shadow: 0 0 10px black;
  color: white;
}

.arrowContainer {
  display: flex;
  gap: 20px;
  margin-bottom: 10px;
}

.arrow {
  font-size: 28px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.9);
  color: black;
  border-radius: 12px;
  border: none;
}

.button {
  background: white;
  color: black;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 16px;
  border: none;
  margin: 6px;
}
</style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: margot_targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.003;"
  renderer="alpha: true; physicallyCorrectLights: true; colorManagement: true; exposure: 2; toneMapping: ACESFilmicToneMapping;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets timeout="10000">
    <a-asset-item id="hdrEnv" src="terrace_sea.hdr"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity environment-map="src: #hdrEnv; intensity: 1.8"></a-entity>

  <a-light type="ambient" intensity="1.2"></a-light>
  <a-light type="directional" intensity="3.0" position="1 3 2"></a-light>
  <a-light type="directional" intensity="1.8" position="-2 2 -1"></a-light>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model
      id="aframeModel"
      src="Plato_01.glb"
      rotation="90 0 0"
      scale="2.8 2.8 2.8">
    </a-gltf-model>
  </a-entity>

</a-scene>

<div id="startScreen">
  <div id="modelTitle">Plato 01</div>

  <div class="arrowContainer">
    <button class="arrow" onclick="prev()">←</button>
    <button class="arrow" onclick="next()">→</button>
  </div>

  <button class="button" onclick="enterAFrame()">A-Frame</button>
</div>

<script>

const models = [
  { name:"Plato 01", file:"Plato_01.glb" },
  { name:"Plato 02", file:"Plato_02.glb" }
];

let current = 0;

function updateUI(){
  document.getElementById("modelTitle").innerText = models[current].name;
  document.getElementById("aframeModel")
    .setAttribute("src", models[current].file);
}

function prev(){
  current = (current-1+models.length)%models.length;
  updateUI();
}

function next(){
  current = (current+1)%models.length;
  updateUI();
}

function enterAFrame(){
  document.getElementById("startScreen").style.display = "none";
}

updateUI();

</script>

</body>
</html>
