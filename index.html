<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Logo 3D</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: sans-serif;
  background: black;
  color: white;
}

#startScreen {
  position: fixed;
  inset: 0;
  background: url("Loading screen.png") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: 20%;
  z-index: 10;
}

#modelTitle {
  font-size: 22px;
  margin-bottom: 12px;
  text-shadow: 0 0 10px black;
}

.arrowContainer {
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 10px;
}

.arrow {
  font-size: 28px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.9);
  color: black;
  border-radius: 12px;
  border: none;
}

.button {
  background: white;
  color: black;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 16px;
  border: none;
  margin: 8px;
}

#fallbackBtn {
  font-size: 13px;
  background: transparent;
  color: white;
  text-decoration: underline;
}
</style>
</head>

<body>

<div id="startScreen">

  <div id="modelTitle">Plato 01</div>

  <div class="arrowContainer">
    <button class="arrow" onclick="prev()">←</button>
    <button class="arrow" onclick="next()">→</button>
  </div>

  <button class="button" onclick="launchAR()">Ver en tu mesa</button>
  <button id="fallbackBtn" onclick="openFallback()">¿No puedes verlo? Pulsa aquí</button>

</div>

<a-scene
  id="iosScene"
  mindar-image="
    imageTargetSrc: margot_targets.mind;
    autoStart: false;
    filterMinCF: 0.0001;
    filterBeta: 0.003;
  "
  renderer="
    physicallyCorrectLights: true;
    colorManagement: true;
    exposure: 2;
    toneMapping: ACESFilmicToneMapping;
  "
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  style="display:none"
>

  <a-assets timeout="10000">
    <a-asset-item id="hdrEnv" src="terrace_sea.hdr"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity environment-map="src: #hdrEnv; intensity: 1.8"></a-entity>

  <a-light type="ambient" intensity="1.2"></a-light>
  <a-light type="directional" intensity="3.0" position="1 3 2"></a-light>
  <a-light type="directional" intensity="1.8" position="-2 2 -1"></a-light>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model
      id="aframeModel"
      src="Plato_01.glb"
      rotation="90 0 0"
      scale="2.8 2.8 2.8">
    </a-gltf-model>
  </a-entity>

</a-scene>

<script>

const models = [
  { name:"Plato 01", file:"Plato_01.glb" },
  { name:"Plato 02", file:"Plato_02.glb" }
];

let current = 0;

function updateUI(){
  document.getElementById("modelTitle").innerText = models[current].name;
  const aframeModel = document.getElementById("aframeModel");
  if (aframeModel){
    aframeModel.setAttribute("src", models[current].file);
  }
}

function prev(){
  current = (current-1+models.length)%models.length;
  updateUI();
}

function next(){
  current = (current+1)%models.length;
  updateUI();
}

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
const isAndroid = /Android/.test(navigator.userAgent);

function launchAR(){

  document.getElementById("startScreen").style.display = "none";

  if (isAndroid) {
    launchSceneViewer();
  } 
  else {
    launchAFrame();
  }
}

function launchSceneViewer(){

  const basePath = window.location.origin + window.location.pathname.replace("index.html","");
  const modelUrl = basePath + models[current].file;

  const intent =
    `intent://arvr.google.com/scene-viewer/1.0?file=${modelUrl}` +
    `&mode=ar_only` +
    `&resizable=false` +
    `#Intent;scheme=https;package=com.google.android.googlequicksearchbox;action=android.intent.action.VIEW;end;`;

  window.location.href = intent;
}

function launchAFrame(){
  const scene = document.querySelector("#iosScene");
  scene.style.display = "block";
  const mindarSystem = scene.systems["mindar-image-system"];
  mindarSystem.start();
}

function openFallback(){
  document.body.innerHTML = `
  <model-viewer
    src="${models[current].file}"
    camera-controls
    auto-rotate
    ar
    ar-modes="scene-viewer quick-look webxr"
    style="width:100vw;height:100vh;background:black;">
  </model-viewer>`;
}

updateUI();

</script>

</body>
</html>
