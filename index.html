<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Test AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: sans-serif;
}

/* A-FRAME */

a-scene {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  background: transparent;
}

/* MODEL VIEWER */

#mvContainer {
  position: fixed;
  inset: 0;
  background: #f2f2f2;
  display: none;
  z-index: 20;
}

model-viewer {
  width: 100%;
  height: 100%;
  background: #f2f2f2;
}

/* MENÚ */

#startScreen {
  position: fixed;
  inset: 0;
  background: url("Loading screen.png") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: 20%;
  z-index: 30;
}

#modelTitle {
  font-size: 22px;
  margin-bottom: 12px;
  text-shadow: 0 0 10px black;
  color: white;
}

.arrowContainer {
  display: flex;
  gap: 20px;
  margin-bottom: 10px;
}

.arrow {
  font-size: 28px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.9);
  color: black;
  border-radius: 12px;
  border: none;
}

.button {
  background: white;
  color: black;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 16px;
  border: none;
  margin: 6px;
}
</style>
</head>

<body>

<!-- A-FRAME -->

<a-scene
  mindar-image="imageTargetSrc: margot_targets.mind; autoStart: true;"
  renderer="alpha: true; physicallyCorrectLights: true; colorManagement: true; exposure: 2; toneMapping: ACESFilmicToneMapping;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model
      id="aframeModel"
      src="Plato_01.glb"
      rotation="90 0 0"
      scale="6 6 6">
    </a-gltf-model>
  </a-entity>

</a-scene>

<!-- MODEL VIEWER -->

<div id="mvContainer">
  <model-viewer
    id="mv"
    src="Plato_01.glb"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    shadow-intensity="0"
    exposure="1"
    occlusion="false">
  </model-viewer>

  <button class="button" style="position:absolute;top:20px;left:20px;z-index:40;"
    onclick="closeModelViewer()">← Volver</button>
</div>

<!-- MENÚ -->

<div id="startScreen">
  <div id="modelTitle">Plato 01</div>

  <div class="arrowContainer">
    <button class="arrow" onclick="prev()">←</button>
    <button class="arrow" onclick="next()">→</button>
  </div>

  <button class="button" onclick="enterAFrame()">A-Frame</button>
  <button class="button" onclick="enterSceneViewer()">Scene Viewer</button>
  <button class="button" onclick="enterModelViewer()">model-viewer</button>
</div>

<script>

const models = [
  { name:"Plato 01", file:"Plato_01.glb" },
  { name:"Plato 02", file:"Plato_02.glb" }
];

let current = 0;

function updateUI(){
  document.getElementById("modelTitle").innerText = models[current].name;
  document.getElementById("aframeModel")
    .setAttribute("src", models[current].file);
  document.getElementById("mv")
    .setAttribute("src", models[current].file);
}

function prev(){
  current = (current-1+models.length)%models.length;
  updateUI();
}

function next(){
  current = (current+1)%models.length;
  updateUI();
}

function enterAFrame(){
  document.getElementById("startScreen").style.display = "none";
}

function enterModelViewer(){
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("mvContainer").style.display = "block";
}

function closeModelViewer(){
  document.getElementById("mvContainer").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
}

function enterSceneViewer(){
  const url = window.location.href;
  const file = models[current].file;
  const intent =
  `intent://${window.location.host}${window.location.pathname}${file}#Intent;scheme=https;package=com.google.ar.core;action=android.intent.action.VIEW;S.browser_fallback_url=${url};end;`;
  window.location.href = intent;
}

updateUI();

</script>

</body>
</html>
