<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Test AR</title>

<!-- 🔒 Anti caché navegador -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: sans-serif;
}

a-scene {
  position: fixed;
  inset: 0;
  background: transparent;
}

#mvContainer {
  position: fixed;
  inset: 0;
  background: #f2f2f2;
  display: none;
  z-index: 20;
}

model-viewer {
  width: 100%;
  height: 100%;
  background: #f2f2f2;
}

#startScreen {
  position: fixed;
  inset: 0;
  background: url("Loading screen.png") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: 20%;
  z-index: 30;
}

#modelTitle {
  font-size: 22px;
  margin-bottom: 12px;
  text-shadow: 0 0 10px black;
  color: white;
}

.arrowContainer {
  display: flex;
  gap: 20px;
  margin-bottom: 10px;
}

.arrow {
  font-size: 28px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.9);
  color: black;
  border-radius: 12px;
  border: none;
}

.button {
  background: white;
  color: black;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 16px;
  border: none;
  margin: 6px;
}
</style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: margot_targets.mind; autoStart: true; filterMinCF: 0.0001; filterBeta: 0.003;"
  renderer="alpha: true; physicallyCorrectLights: true; colorManagement: true; exposure: 3.5; toneMapping: ACESFilmicToneMapping;"
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

<a-assets>
  <a-asset-item id="hdrEnv" src="terrace_sea.hdr"></a-asset-item>
</a-assets>

<a-entity environment-map="src: #hdrEnv; intensity: 1.5"></a-entity>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity mindar-image-target="targetIndex: 0">
  <a-gltf-model
    id="aframeModel"
    src="Plato_01.glb"
    rotation="90 0 0"
    scale="6 6 6">
  </a-gltf-model>
</a-entity>

</a-scene>

<div id="mvContainer">
  <model-viewer
    id="mv"
    src="Plato_01.glb"
    ar
    ar-modes="scene-viewer webxr quick-look"
    camera-controls
    shadow-intensity="0"
    exposure="1"
    occlusion="false">
  </model-viewer>
</div>

<div id="startScreen">
  <div id="modelTitle">Plato 01</div>

  <div class="arrowContainer">
    <button class="arrow" onclick="prev()">←</button>
    <button class="arrow" onclick="next()">→</button>
  </div>

  <button class="button" onclick="enterSceneViewer()">Scene Viewer</button>
  <button class="button" onclick="enterAFrame()">A-FraMe</button>
  <button class="button" onclick="enterModelViewer()">model-viewer</button>
</div>

<script>

const models = [
  { name:"Plato 01", file:"Plato_01.glb" },
  { name:"Plato 02", file:"Plato_02.glb" }
];

let current = 0;

function absoluteModelURL(file){
  return window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + file;
}

function updateUI(){
  document.getElementById("modelTitle").innerText = models[current].name;
  document.getElementById("aframeModel").setAttribute("src", models[current].file);
  document.getElementById("mv").setAttribute("src", models[current].file);
}

function prev(){
  current = (current - 1 + models.length) % models.length;
  updateUI();
}

function next(){
  current = (current + 1) % models.length;
  updateUI();
}

function enterAFrame(){
  document.getElementById("startScreen").style.display = "none";
  history.pushState({mode:"aframe"}, "");
}

function enterModelViewer(){
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("mvContainer").style.display = "block";
  history.pushState({mode:"modelviewer"}, "");
}

function enterSceneViewer(){
  const modelURL = absoluteModelURL(models[current].file);
  const fallbackURL = window.location.href + "?fallback=aframe";

  const intent =
    `intent://arvr.google.com/scene-viewer/1.0?file=${encodeURIComponent(modelURL)}&mode=ar_only&disable_occlusion=true#Intent;scheme=https;package=com.google.android.googlequicksearchbox;action=android.intent.action.VIEW;S.browser_fallback_url=${encodeURIComponent(fallbackURL)};end;`;

  window.location.href = intent;
}

window.addEventListener("popstate", function(){
  document.getElementById("mvContainer").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
});

if (window.location.search.includes("fallback=aframe")) {
  document.getElementById("startScreen").style.display = "none";
}

/* 🔄 Fuerza recarga si Chrome usa Back-Forward Cache */
window.addEventListener("pageshow", function (event) {
  if (event.persisted) {
    window.location.reload();
  }
});

updateUI();

</script>

</body>
</html>
