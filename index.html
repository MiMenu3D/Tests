<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Test AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: sans-serif;
  background: black;
  color: white;
}

/* -------- MENÚ -------- */

#startScreen {
  position: fixed;
  inset: 0;
  background: url("Loading screen.png") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: 20%;
  z-index: 10;
}

#modelTitle {
  font-size: 22px;
  margin-bottom: 12px;
  text-shadow: 0 0 10px black;
}

.arrowContainer {
  display: flex;
  gap: 20px;
  margin-bottom: 10px;
}

.arrow {
  font-size: 28px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.9);
  color: black;
  border-radius: 12px;
  border: none;
}

.button {
  background: white;
  color: black;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 16px;
  border: none;
  margin: 6px;
}

/* -------- AFRAME -------- */

#iosScene {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  visibility: hidden;
}
</style>
</head>

<body>

<div id="startScreen">
  <div id="modelTitle">Plato 01</div>

  <div class="arrowContainer">
    <button class="arrow" onclick="prev()">←</button>
    <button class="arrow" onclick="next()">→</button>
  </div>

  <button class="button" onclick="launchSceneViewer()">Ver en tu mesa</button>
  <button class="button" onclick="launchAFrame()">A-Frame</button>
  <button class="button" onclick="openFallback()">Ver modelo 3D</button>
</div>

<a-scene
  id="iosScene"
  mindar-image="
    imageTargetSrc: margot_targets.mind;
    autoStart: false;
    filterMinCF: 0.0001;
    filterBeta: 0.003;
  "
  renderer="
    physicallyCorrectLights: true;
    colorManagement: true;
    exposure: 2;
    toneMapping: ACESFilmicToneMapping;
  "
  color-space="sRGB"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

  <a-assets timeout="10000">
    <a-asset-item id="hdrEnv" src="terrace_sea.hdr"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity environment-map="src: #hdrEnv; intensity: 1.8"></a-entity>

  <a-light type="ambient" intensity="1.2"></a-light>
  <a-light type="directional" intensity="3.0" position="1 3 2"></a-light>
  <a-light type="directional" intensity="1.8" position="-2 2 -1"></a-light>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model
      id="aframeModel"
      src="Plato_01.glb"
      rotation="90 0 0"
      scale="2.8 2.8 2.8">
    </a-gltf-model>
  </a-entity>

</a-scene>

<script>

const models = [
  { name:"Plato 01", file:"Plato_01.glb" },
  { name:"Plato 02", file:"Plato_02.glb" }
];

let current = 0;
let arActive = false;
let modelViewerActive = false;

function updateUI(){
  document.getElementById("modelTitle").innerText = models[current].name;
  const aframeModel = document.getElementById("aframeModel");
  if (aframeModel){
    aframeModel.setAttribute("src", models[current].file);
  }
}

function prev(){
  current = (current-1+models.length)%models.length;
  updateUI();
}

function next(){
  current = (current+1)%models.length;
  updateUI();
}

/* -------- SCENE VIEWER -------- */

function launchSceneViewer(){

  const basePath = window.location.origin + window.location.pathname.replace("index.html","");
  const modelUrl = basePath + models[current].file;

  const intent =
    `intent://arvr.google.com/scene-viewer/1.0?file=${modelUrl}` +
    `&mode=ar_only` +
    `&resizable=false` +
    `&disable_occlusion=true` +
    `#Intent;scheme=https;package=com.google.android.googlequicksearchbox;action=android.intent.action.VIEW;end;`;

  window.location.href = intent;
}

/* -------- AFRAME -------- */

function launchAFrame(){

  history.pushState({ ar:true }, "");
  arActive = true;

  document.getElementById("startScreen").style.display = "none";

  const scene = document.querySelector("#iosScene");
  scene.style.visibility = "visible";

  if (scene.hasLoaded) {
    scene.systems["mindar-image-system"].start();
  } else {
    scene.addEventListener("loaded", () => {
      scene.systems["mindar-image-system"].start();
    }, { once: true });
  }
}

function exitAFrame(){

  const scene = document.querySelector("#iosScene");
  const mindarSystem = scene.systems["mindar-image-system"];

  mindarSystem.stop();

  scene.style.visibility = "hidden";
  document.getElementById("startScreen").style.display = "flex";

  arActive = false;
}

/* -------- MODEL VIEWER -------- */

function openFallback(){

  history.pushState({ mv:true }, "");
  modelViewerActive = true;

  const mvContainer = document.createElement("div");
  mvContainer.id = "mvContainer";
  mvContainer.style.position = "fixed";
  mvContainer.style.top = "0";
  mvContainer.style.left = "0";
  mvContainer.style.width = "100vw";
  mvContainer.style.height = "100vh";
  mvContainer.style.background = "#f2f2f2";
  mvContainer.style.zIndex = "20";

  mvContainer.innerHTML = `
    <model-viewer
      src="${models[current].file}"
      camera-controls
      auto-rotate
      shadow-intensity="0"
      style="width:100%;height:100%;">
    </model-viewer>
  `;

  document.body.appendChild(mvContainer);
}

function exitModelViewer(){
  const mv = document.getElementById("mvContainer");
  if (mv) mv.remove();
  modelViewerActive = false;
}

/* -------- BACK BUTTON -------- */

window.addEventListener("popstate", () => {

  if (arActive) {
    exitAFrame();
  }

  if (modelViewerActive) {
    exitModelViewer();
  }

});

updateUI();

</script>

</body>
</html>
