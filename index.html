<!DOCTYPE html>
<html>
<head>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
body{
margin:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

button{
padding:15px 25px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
cursor:pointer;
}

#viewer{
width:100%;
height:100%;
display:none;
}
</style>

</head>
<body>

<button onclick="startAR()">Abrir AR</button>
<button onclick="forceSceneViewer()">Scene Viewer</button>

<model-viewer
id="viewer"
src="modelo.glb"
ar
ar-modes="webxr scene-viewer quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
></model-viewer>

<script>

const viewer = document.getElementById("viewer")

async function startAR(){

if(navigator.xr){

try{

const supported = await navigator.xr.isSessionSupported("immersive-ar")

if(supported){

launchWebXR()
return

}

}catch(e){}

}

launchSceneViewer()

}

function launchWebXR(){

viewer.style.display="block"

viewer.activateAR()

checkRender()

}

function checkRender(){

setTimeout(()=>{

const mesh = viewer.model

if(!mesh){

console.log("WebXR sin polígonos → fallback")

launchSceneViewer()

}

},4000)

}

function launchSceneViewer(){

const ua = navigator.userAgent.toLowerCase()

if(ua.includes("android")){

const url = `intent://arvr.google.com/scene-viewer/1.0?file=https://tuweb.com/modelo.glb&mode=ar_only#Intent;scheme=https;package=com.google.android.googlequicksearchbox;end;`

window.location.href = url

return

}

launchQuickLook()

}

function launchQuickLook(){

const link = document.createElement("a")

link.setAttribute("rel","ar")

link.setAttribute("href","modelo.usdz")

document.body.appendChild(link)

link.click()

}

function forceSceneViewer(){

launchSceneViewer()

}

</script>

</body>
</html>
